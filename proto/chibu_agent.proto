syntax = "proto3";

package chibu;

// ChiAgent — gRPC service exposed by each pi agent instance.
// Clients (and the control plane) connect here to submit tasks and receive
// streaming events.  The underlying LLM work is delegated to a persistent
// `pi --mode rpc` subprocess; no Anthropic SDK touches this process.
service ChiAgent {
  // Execute a prompt, streaming back pi RPC events as they arrive.
  rpc Execute(ExecuteRequest) returns (stream ExecuteResponse);

  // Agent identity / capability metadata.
  rpc GetInfo(InfoRequest) returns (InfoResponse);

  // List skills installed in the agent's .pi/skills/ directory.
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);

  // Stop the pi subprocess, re-read .pi/ from disk, restart.
  // Call this after mutating skills, extensions, or packages.
  rpc Reload(ReloadRequest) returns (ReloadResponse);

  // Health / readiness probe.
  rpc Ping(PingRequest) returns (PongResponse);
}

// ─── Execute ──────────────────────────────────────────────────────────────────

message ExecuteRequest {
  string auth_token      = 1;
  string prompt          = 2;
  string session_id      = 3;  // informational; pi manages sessions internally
  string model           = 5;  // "staah" | "faah"; omit/empty → "faah"
  bool   new_session     = 6;  // send new_session command before prompting
  bool   compact_first   = 7;  // compact the current session before prompting
  repeated string files  = 8;  // file paths prepended as @file refs
  int32  timeout_seconds = 9;  // 0 → default (120 s)
}

message ExecuteResponse {
  string content    = 1;
  bool   is_done    = 2;
  // event_type values mirror pi RPC event types:
  //   "text"         — streamed assistant text chunk
  //   "tool_use"     — pi started a tool call
  //   "tool_update"  — incremental tool output
  //   "tool_result"  — tool call finished
  //   "agent_start"  — pi agent loop began
  //   "done"         — agent loop finished cleanly
  //   "error"        — fatal error; is_done = true
  string event_type = 3;
  string session_id = 4;
  int64  timestamp  = 5;
  string tool_name  = 6;
}

// ─── Info ─────────────────────────────────────────────────────────────────────

message InfoRequest {
  string auth_token = 1;
}

message InfoResponse {
  string agent_id   = 1;
  string name       = 2;
  string chiboo     = 3;  // agent group (chiboo) name
  repeated string skills = 5;
  string status     = 7;
  int32  grpc_port  = 8;
  string pid        = 9;
}

// ─── Skills ───────────────────────────────────────────────────────────────────

message ListSkillsRequest {
  string auth_token = 1;
}

message SkillInfo {
  string name        = 1;
  string description = 2;
  string license     = 3;
}

message ListSkillsResponse {
  repeated SkillInfo skills = 1;
}

// ─── Reload ───────────────────────────────────────────────────────────────────

message ReloadRequest {
  string auth_token = 1;
}

message ReloadResponse {
  bool   ok      = 1;
  string message = 2;
}

// ─── Ping ─────────────────────────────────────────────────────────────────────

message PingRequest {
  string message = 1;
}

message PongResponse {
  string message   = 1;
  int64  timestamp = 2;
}
