syntax = "proto3";

package chibu;

// ChiAgent — gRPC service exposed by each Pi agent instance
service ChiAgent {
  // Execute an agent with a prompt, streaming back events
  rpc Execute(ExecuteRequest) returns (stream ExecuteResponse);

  // Retrieve agent identity and capability metadata
  rpc GetInfo(InfoRequest) returns (InfoResponse);

  // List skills available on this agent
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);

  // Health check
  rpc Ping(PingRequest) returns (PongResponse);
}

// ─── Execute ──────────────────────────────────────────────────────────────────

message ExecuteRequest {
  string auth_token  = 1;
  string prompt      = 2;
  string session_id  = 3;
  map<string, string> context = 4;
  string model_id    = 5;  // optional; uses agent default when empty
}

message ExecuteResponse {
  string content    = 1;
  bool   is_done    = 2;
  // event_type: "text" | "tool_use" | "tool_result" | "error" | "done"
  string event_type = 3;
  string session_id = 4;
  int64  timestamp  = 5;
  string tool_name  = 6;  // populated on tool_use / tool_result events
}

// ─── Info ─────────────────────────────────────────────────────────────────────

message InfoRequest {
  string auth_token = 1;
}

message InfoResponse {
  string agent_id    = 1;
  string name        = 2;
  string agent_group = 3;
  string version     = 4;
  repeated string skills = 5;
  repeated string models = 6;
  string status      = 7;
  int32  grpc_port   = 8;
}

// ─── Skills ───────────────────────────────────────────────────────────────────

message ListSkillsRequest {
  string auth_token = 1;
}

message SkillInfo {
  string name        = 1;
  string description = 2;
  string version     = 3;
  repeated string parameters = 4;
}

message ListSkillsResponse {
  repeated SkillInfo skills = 1;
}

// ─── Ping ─────────────────────────────────────────────────────────────────────

message PingRequest {
  string message = 1;
}

message PongResponse {
  string message   = 1;
  int64  timestamp = 2;
}
