# Chibu Pi Agent — default configuration
agent:
  version: "0.1.0"
  org: "badmono"

otel:
  enabled: false
  endpoint: "http://localhost:4317"
  http_endpoint: "http://localhost:4318"
  service_name: "chibu-pi-agent"
  export_interval_ms: 5000
  protocol: "grpc"   # grpc | http

logging:
  debug: false
  level: "INFO"
